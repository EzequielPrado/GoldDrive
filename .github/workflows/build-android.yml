name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java (Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependências
        run: |
          rm -f package-lock.json
          npm install

      - name: Build do projeto Web
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Gerar ícones e splash screen
        run: npx capacitor-assets generate --android

      - name: Tornar Gradlew executável
        run: chmod +x android/gradlew

      - name: Build APK Debug
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: GoldDrive-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build APK Release (Unsigned)
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload APK (Release)
        uses: actions/upload-artifact@v4
        with:
          name: GoldDrive-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Build AAB (Android App Bundle - Play Store)
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: GoldDrive-release-bundle
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
